name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lambda tests ──────────────────────────────────────────────────────────
  lambda-tests:
    name: Lambda tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"        # match imageValidator runtime
          cache: "pip"
          cache-dependency-path: lambda/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd lambda
          pip install -r requirements-dev.txt

      - name: Run Lambda tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          cd lambda
          pytest tests/ \
            --cov=generateUploadUrl \
            --cov=getMediaStatus \
            --cov=imageValidator \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

  # ─── Frontend lint + build ─────────────────────────────────────────────────
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.execute-api.us-east-1.amazonaws.com
          VITE_COGNITO_USER_POOL_ID: placeholder-pool-id
          VITE_COGNITO_CLIENT_ID: placeholder-client-id

  # ─── Terraform validate ────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Terraform init (no backend)
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate \
            -var="cloudfront_waf_arn=arn:aws:wafv2:us-east-1:000000000000:global/webacl/placeholder/placeholder"

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: Run tflint
        run: |
          tflint --init
          tflint
        working-directory: terraform

      - name: Terraform format check
        run: |
          cd terraform
          terraform fmt -check -recursive